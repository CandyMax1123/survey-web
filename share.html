<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>分享管理</title>
  <link rel="stylesheet" href="css/style.css?v=20260424" />
  <script src="js/cloudbase.full.js"></script>
</head>
<body>

<nav class="nav-bar">
  <div class="nav-inner">
    <button class="nav-back" onclick="history.back()">&#8592; 返回</button>
    <span class="nav-title">分享管理</span>
    <button class="btn btn-primary btn-sm" id="btn-new-share">＋ 新增分享</button>
  </div>
</nav>

<div class="page-container">
  <div style="margin-top:16px;margin-bottom:4px;">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <div style="font-size:1rem;font-weight:700;color:var(--text);" id="q-name-display"></div>
      <button class="btn btn-plain btn-sm" id="btn-refresh">↻ 刷新</button>
    </div>
    <div style="font-size:.85rem;color:var(--text-muted);margin-top:4px;">以下为该问卷的所有分享链接（备注名仅您可见）</div>
  </div>
  <div class="divider"></div>
  <div id="token-list">
    <div class="empty-state"><div class="spinner" style="margin:0 auto;"></div></div>
  </div>
</div>

<!-- 新增分享 Modal -->
<div id="modal-add-overlay" class="modal-overlay center" hidden>
  <div class="modal-box">
    <div class="modal-title">新增分享对象</div>
    <div class="form-group">
      <label class="form-label">备注名 <span class="hint">（仅您可见，用于区分不同对象）</span></label>
      <input class="form-input" id="new-nickname" type="text" placeholder="例如：张三、客户A" maxlength="30" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-plain" id="btn-cancel-add">取消</button>
      <button class="btn btn-primary" id="btn-confirm-add">生成链接</button>
    </div>
  </div>
</div>

<!-- 编辑备注 Modal -->
<div id="modal-edit-overlay" class="modal-overlay center" hidden>
  <div class="modal-box">
    <div class="modal-title">修改备注名</div>
    <div class="form-group">
      <label class="form-label">备注名</label>
      <input class="form-input" id="edit-nickname" type="text" maxlength="30" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-plain" id="btn-cancel-edit">取消</button>
      <button class="btn btn-primary" id="btn-confirm-edit">保存</button>
    </div>
  </div>
</div>

<!-- 显示链接 Modal -->
<div id="modal-link-overlay" class="modal-overlay center" hidden>
  <div class="modal-box">
    <div class="modal-title">分享链接已生成</div>
    <div style="font-size:.85rem;color:var(--text-muted);margin-bottom:10px;">将以下链接发送给对方（每个链接仅限一人使用）</div>
    <div style="display:flex;gap:8px;align-items:stretch;margin-bottom:16px;">
      <input class="form-input" id="share-link-display" readonly style="font-size:.8rem;background:var(--bg);" />
      <button class="btn btn-primary" id="btn-copy-link" style="flex-shrink:0;">复制</button>
    </div>
    <button class="btn btn-plain btn-block" id="btn-close-link">关闭</button>
  </div>
</div>

<div id="loading-overlay" class="hidden"><div class="spinner"></div></div>
<div id="toast-container"></div>


<script type="module">
  import { db, serverTimestamp } from './js/cloudbase-db.js?v=20260423'
  import { requireAdmin } from './js/cloudbase-auth.js?v=20260423'
  import { showLoading, hideLoading, showToast, getParam, generateToken, formatDate, confirm } from './js/utils.js?v=20260423'

  const user = await requireAdmin()
  const questionnaireId = getParam('id')
  if (!questionnaireId) { location.href = 'index.html'; }

  let editingTokenId = ''
  let questionnaireName = ''

  async function loadData() {
    showLoading()
    try {
      const qSnap = await db.get('questionnaires', questionnaireId)
      if (!qSnap.exists || qSnap.data()._adminUid !== user.uid) {
        showToast('无权限', 'error'); location.href = 'index.html'; return
      }
      questionnaireName = qSnap.data().name || '（未命名）'
      document.getElementById('q-name-display').textContent = questionnaireName

      const tokens = (await db.query('share_tokens', {
        filters: [{ field: 'questionnaireId', op: '==', value: questionnaireId }],
        orderBy: { field: 'createdAt', desc: true }
      })).map(d => ({ id: d.id, ...d.data() }))

      renderTokenList(tokens)
    } catch(e) {
      console.error(e)
      showToast('加载失败', 'error')
    } finally {
      hideLoading()
    }
  }

  function renderTokenList(tokens) {
    const container = document.getElementById('token-list')
    if (tokens.length === 0) {
      container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🔗</div><div class="empty-state-text">暂无分享记录，点击右上角添加</div></div>`
      return
    }
    container.innerHTML = ''
    tokens.forEach(t => {
      const statusLabel = { pending: '未打开', opened: '已打开', submitted: '已提交' }[t.status] || t.status
      const badgeClass = { pending: 'badge-pending', opened: 'badge-opened', submitted: 'badge-submitted' }[t.status] || ''
      const row = document.createElement('div')
      row.className = 'card'
      row.style.padding = '14px'
      row.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px;">
          <div>
            <span style="font-size:1rem;font-weight:600;">${escHtml(t.nickname || '（未命名）')}</span>
            <span class="badge ${badgeClass}" style="margin-left:8px;">${statusLabel}</span>
          </div>
          <button class="btn btn-plain btn-sm" data-action="edit-nickname" data-id="${t.id}" data-nickname="${escHtml(t.nickname||'')}">改备注</button>
        </div>
        <div style="font-size:.78rem;color:var(--text-muted);margin-bottom:10px;word-break:break-all;">
          ${buildShareLink(t.token)}
        </div>
        <div class="token-actions-row">
          <button class="btn btn-ghost btn-sm" data-action="copy-link" data-token="${t.token}">复制链接</button>
          <button class="btn btn-sm" style="background:var(--success-light);color:#16A34A;" data-action="view-answer" data-id="${t.id}" data-status="${t.status}" ${t.status!=='submitted'?'disabled':''}>查看答案</button>
          <button class="btn btn-sm" style="background:var(--danger-light);color:var(--danger);" data-action="delete-answer" data-id="${t.id}" data-status="${t.status}" ${t.status!=='submitted'?'disabled':''}>删除答案</button>
          <button class="btn btn-plain btn-sm" data-action="delete-token" data-id="${t.id}">删除链接</button>
        </div>
      `
      container.appendChild(row)
    })
  }

  // 事件委托：只注册一次，监听整个列表区域
  document.getElementById('token-list').addEventListener('click', async e => {
    const btn = e.target.closest('[data-action]')
    if (!btn || btn.disabled) return
    const { action, id, token, nickname } = btn.dataset

    if (action === 'copy-link') {
      const link = buildShareLink(token)
      await copyToClipboard(link)
    } else if (action === 'view-answer') {
      location.href = `answer-view.html?shareTokenId=${id}`
    } else if (action === 'delete-answer') {
      if (await confirm('确定删除该份答卷？删除后对方可重新填写。', '删除', '取消', true)) {
        doDeleteAnswer(id)
      }
    } else if (action === 'delete-token') {
      if (await confirm('确定删除该分享链接？如对方已提交答案将同时删除。', '删除', '取消', true)) {
        doDeleteToken(id)
      }
    } else if (action === 'edit-nickname') {
      openEditModal(id, nickname || '')
    }
  })

  function buildShareLink(token) {
    return `${location.origin}${location.pathname.replace('share.html','answer.html')}?token=${token}`
  }

  async function copyToClipboard(text) {
    try {
      await navigator.clipboard.writeText(text)
      showToast('链接已复制', 'success')
    } catch {
      const input = document.getElementById('share-link-display')
      input.value = text
      document.getElementById('modal-link-overlay').removeAttribute('hidden')
    }
  }

  // 刷新按钮
  document.getElementById('btn-refresh').addEventListener('click', async () => {
    await loadData()
    showToast('刷新成功', 'success')
  })

  // 新增分享 Modal
  document.getElementById('btn-new-share').addEventListener('click', () => {
    document.getElementById('new-nickname').value = ''
    document.getElementById('modal-add-overlay').removeAttribute('hidden')
    setTimeout(() => document.getElementById('new-nickname').focus(), 100)
  })
  document.getElementById('btn-cancel-add').addEventListener('click', () => {
    document.getElementById('modal-add-overlay').setAttribute('hidden', '')
  })
  document.getElementById('modal-add-overlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) e.currentTarget.setAttribute('hidden', '')
  })
  document.getElementById('btn-confirm-add').addEventListener('click', () => {
    const nickname = document.getElementById('new-nickname').value.trim()
    document.getElementById('modal-add-overlay').setAttribute('hidden', '')
    createShare(nickname)
  })
  document.getElementById('new-nickname').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btn-confirm-add').click()
  })

  async function createShare(nickname) {
    showLoading()
    try {
      // 生成唯一 token（本地碰撞检测）
      let token
      for (let i = 0; i < 10; i++) {
        token = generateToken()
        const existing = await db.query('share_tokens', { filters: [{ field: 'token', op: '==', value: token }] })
        if (existing.length === 0) break
      }

      await db.add('share_tokens', {
        questionnaireId,
        token,
        nickname: nickname || '',
        respondentUid: null,
        status: 'pending',
        createdAt: serverTimestamp(),
        usedAt: null,
        submittedAt: null,
      })

      const link = buildShareLink(token)
      document.getElementById('share-link-display').value = link
      document.getElementById('modal-link-overlay').removeAttribute('hidden')

      loadData()
    } catch(e) {
      showToast('创建失败：' + e.message, 'error')
    } finally {
      hideLoading()
    }
  }

  // 链接 Modal
  document.getElementById('btn-copy-link').addEventListener('click', async () => {
    const link = document.getElementById('share-link-display').value
    try { await navigator.clipboard.writeText(link); showToast('已复制', 'success') } catch {}
  })
  document.getElementById('btn-close-link').addEventListener('click', () => {
    document.getElementById('modal-link-overlay').setAttribute('hidden', '')
  })

  // 编辑备注 Modal
  function openEditModal(tokenId, currentNickname) {
    editingTokenId = tokenId
    document.getElementById('edit-nickname').value = currentNickname
    document.getElementById('modal-edit-overlay').removeAttribute('hidden')
    setTimeout(() => document.getElementById('edit-nickname').focus(), 100)
  }
  document.getElementById('btn-cancel-edit').addEventListener('click', () => {
    document.getElementById('modal-edit-overlay').setAttribute('hidden', '')
  })
  document.getElementById('modal-edit-overlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) e.currentTarget.setAttribute('hidden', '')
  })
  document.getElementById('btn-confirm-edit').addEventListener('click', async () => {
    const nickname = document.getElementById('edit-nickname').value.trim()
    document.getElementById('modal-edit-overlay').setAttribute('hidden', '')
    showLoading()
    try {
      await db.update('share_tokens', editingTokenId, { nickname })
      showToast('备注已更新', 'success')
      loadData()
    } catch(e) {
      showToast('更新失败', 'error')
    } finally {
      hideLoading()
    }
  })
  document.getElementById('edit-nickname').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btn-confirm-edit').click()
  })

  // 删除答案（保留 token 和 respondentUid，重置为 opened，让用户可重新填写）
  async function doDeleteAnswer(shareTokenId) {
    showLoading()
    try {
      const answers = await db.query('answers', { filters: [{ field: 'shareTokenId', op: '==', value: shareTokenId }] })
      for (const d of answers) await db.delete('answers', d.id)
      // 保留 respondentUid，状态改回 opened（用户打开过链接，可重新提交）
      await db.update('share_tokens', shareTokenId, { status: 'opened', submittedAt: null })
      showToast('答案已删除，对方可重新填写', 'success')
      loadData()
    } catch(e) {
      showToast('删除失败', 'error')
    } finally {
      hideLoading()
    }
  }

  // 删除整条 token（含答案）
  async function doDeleteToken(shareTokenId) {
    showLoading()
    try {
      const answers = await db.query('answers', { filters: [{ field: 'shareTokenId', op: '==', value: shareTokenId }] })
      for (const d of answers) await db.delete('answers', d.id)
      await db.delete('share_tokens', shareTokenId)
      showToast('链接已删除', 'success')
      loadData()
    } catch(e) {
      showToast('删除失败', 'error')
    } finally {
      hideLoading()
    }
  }

  function escHtml(str) {
    return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
  }

  loadData()
</script>
</body>
</html>
