<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 — 问卷系统</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-title">📋 问卷系统</div>
    <div class="login-sub">管理员登录</div>

    <div id="form-login">
      <div class="form-group">
        <label class="form-label">用户名</label>
        <input class="form-input" type="text" id="login-email" placeholder="请输入用户名" autocomplete="username" />
      </div>
      <div class="form-group">
        <label class="form-label">密码</label>
        <input class="form-input" type="password" id="login-pwd" placeholder="请输入密码" autocomplete="current-password" />
      </div>
      <button class="btn btn-primary btn-block" id="btn-login">登录</button>
    </div>

    <div id="auth-error" style="display:none;margin-top:12px;color:var(--danger);font-size:.875rem;text-align:center;"></div>
  </div>
</div>

<div id="loading-overlay" class="hidden"><div class="spinner"></div></div>
<div id="toast-container"></div>


<script>
  // 不使用 ES module，避免 top-level await 阻塞按钮注册
  const ENV_ID = 'candymaxserver-d2gt2bl4j640d935a'
  let _auth = null

  function getAuth() {
    if (_auth) return _auth
    const sdk = window.cloudbase || window.tcb
    if (!sdk) throw new Error('CloudBase SDK 未加载，请刷新页面')
    const app = sdk.init({ env: ENV_ID })
    _auth = app.auth({ persistence: 'local' })
    return _auth
  }

  function showError(msg) {
    const el = document.getElementById('auth-error')
    el.textContent = msg
    el.style.display = 'block'
  }
  function clearError() {
    document.getElementById('auth-error').style.display = 'none'
  }
  function showLoading() {
    document.getElementById('loading-overlay').classList.remove('hidden')
  }
  function hideLoading() {
    document.getElementById('loading-overlay').classList.add('hidden')
  }

  // 按钮点击立即可用，SDK 在点击时才初始化
  document.getElementById('btn-login').addEventListener('click', async () => {
    clearError()
    const username = document.getElementById('login-email').value.trim()
    const pwd = document.getElementById('login-pwd').value
    if (!username || !pwd) { showError('请填写用户名和密码'); return }
    showLoading()
    try {
      const auth = getAuth()
      await auth.signInWithUsernameAndPassword(username, pwd)
      location.href = 'index.html'
    } catch(e) {
      console.error(e)
      showError(e.message || '登录失败，请检查用户名和密码')
    } finally {
      hideLoading()
    }
  })

  document.getElementById('login-pwd').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btn-login').click()
  })

  // SDK 加载完后检查登录态（不阻塞按钮）
  window.addEventListener('load', async () => {
    try {
      const auth = getAuth()
      const loginState = await auth.getLoginState()
      if (loginState && !loginState.isAnonymous) {
        location.href = 'index.html'
      }
    } catch(e) { /* 未登录或 SDK 异常，忽略 */ }
  })
</script>
</body>
</html>
